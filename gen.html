function makePageContent(tpl,p){

 h=h.replace(/VPN для Roblox/g,'VPN для '+p.t);
 h=h.replace(/vpn-dlya-roblox/g,p.f);
 h=h.replace(/игры в Roblox/g,p.d.toLowerCase());
 h=h.replace(/игру в Roblox/g,p.d.toLowerCase());
 h=h.replace(/Roblox в России/g,p.t+' в России');
 h=h.replace(/для игры в Roblox/g,'для '+p.t);
 h=h.replace(/низкий пинг и обход блокировок/gi,p.d);

async function createFile(path,content,msg){
 const b64=btoa(unescape(encodeURIComponent(content)));
 let sha=null;
 try{
  const g=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+path,{headers:{'Authorization':'token '+TOKEN}});
  if(g.ok){const j=await g.json();sha=j.sha}
 }catch(e){}
 const body={message:msg,content:b64,branch:BRANCH};
 if(sha)body.sha=sha;
 const r=await fetch('https://api.github.com/repos/'+OWNER+'/'+REPO+'/contents/'+path,{
  method:'PUT',headers:{'Authorization':'token '+TOKEN,'Content-Type':'application/json'},
  body:JSON.stringify(body)
 });
 return r.ok;
}

  const content=makePageContent(tpl,p);
  const success=await createFile(fn,content,'Add '+fn);
  if(success){ok++;log('  OK')}else{fail++;log('  FAIL')}

}
