<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Fix3</title></head><body>
<h2>Fix game text v3</h2>
<input id="tk" placeholder="Token" style="width:400px;padding:8px"><br><br>
<button onclick="run()">RUN</button>
<pre id="log" style="white-space:pre-wrap;font-size:12px;max-height:600px;overflow:auto"></pre>
<script>
var REPO='zebroi/vpn-catalog';
var GP=['vpn-dlya-roblox','vpn-dlya-brawl-stars','vpn-dlya-clash-royale','vpn-dlya-minecraft','vpn-dlya-pubg-mobile','vpn-dlya-free-fire','vpn-dlya-fifa','vpn-dlya-gta','vpn-dlya-geometry-dash','vpn-dlya-nulls-brawl','vpn-dlya-osu','vpn-dlya-igr'];
var L=document.getElementById('log');
function lg(s){L.textContent+=s+'\n';L.scrollTop=9e9;}
function dec(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,''))));}
function enc(s){return btoa(unescape(encodeURIComponent(s)));}
async function run(){
var tk=document.getElementById('tk').value.trim();
if(!tk){alert('token');return;}
var H={'Authorization':'token '+tk,'Content-Type':'application/json'};
lg('Fetching...');
var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/',{headers:H});
var fs=await r.json();
var hf=fs.filter(function(f){return f.name.startsWith('vpn-')&&f.name.endsWith('.html');});
lg(hf.length+' files');
var c=0;
for(var i=0;i<hf.length;i++){
var f=hf[i],sl=f.name.replace('.html','');
if(GP.indexOf(sl)!==-1){lg('SKIP '+f.name);continue;}
lg(f.name+'...');
var r2=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+f.name,{headers:H});
var j=await r2.json();
var raw=dec(j.content),x=raw;
x=x.split('Отзывы игроков о VPN для').join('Отзывы пользователей о VPN для');
x=x.split('отзывы игроков о VPN для').join('отзывы пользователей о VPN для');
x=x.split('Для казуальной игры хватает').join('Для обычного использования хватает');
x=x.split('нарушение правил игры').join('нарушение правил сервиса');
x=x.split('без лагов и банов').join('без сбоев и ограничений');
x=x.split('низкий пинг и обход блокировок').join('стабильный доступ и обход блокировок');
x=x.split('Выбирайте по пингу, скорости и цене').join('Выбирайте по скорости, надёжности и цене');
x=x.split('Играю в').join('Пользуюсь');
x=x.split('играет в').join('использует');
x=x.split('казуал').join('обычное использование');
x=x.split('низкий пинг для игр').join('стабильное соединение');
x=x.split('почему он важен для игр').join('почему он важен');
x=x.split('и других игр').join('и других сервисов');
if(x===raw){lg(' no changes');continue;}
lg(' saving...');
var bd=JSON.stringify({message:'fix2: '+f.name,content:enc(x),branch:'main',sha:j.sha});
var rp=await fetch('https://api.github.com/repos/'+REPO+'/contents/'+f.name,{method:'PUT',headers:H,body:bd});
lg(' '+(rp.ok?'OK':'FAIL '+rp.status));
if(rp.ok)c++;
await new Promise(function(r){setTimeout(r,400);});
}
lg('Done! '+c+' fixed.');
}
</script></body></html>
