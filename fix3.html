<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Fix Game Text</title></head><body>
<h2>Fix game-related text in non-game pages</h2>
<input id="tk" placeholder="GitHub Token" style="width:400px;padding:8px">
<button onclick="run()">FIX ALL NON-GAME PAGES</button>
<pre id="log" style="white-space:pre-wrap;font-size:12px;max-height:600px;overflow:auto"></pre>
<script>
var gamePages=['vpn-dlya-roblox','vpn-dlya-brawl-stars','vpn-dlya-clash-royale','vpn-dlya-minecraft','vpn-dlya-pubg-mobile','vpn-dlya-free-fire','vpn-dlya-fifa','vpn-dlya-gta','vpn-dlya-geometry-dash','vpn-dlya-nulls-brawl','vpn-dlya-osu','vpn-dlya-igr'];
var L=document.getElementById('log');
function log(s){L.textContent+=s+'\n';L.scrollTop=L.scrollHeight;}
async function run(){
var tk=document.getElementById('tk').value.trim();
if(!tk){alert('Enter token');return;}
log('Fetching file list...');
var r=await fetch('https://api.github.com/repos/zebroi/vpn-catalog/contents/',{headers:{'Authorization':'token '+tk}});
var files=await r.json();
var htmlFiles=files.filter(f=>f.name.startsWith('vpn-')&&f.name.endsWith('.html'));
log('Found '+htmlFiles.length+' vpn-* files');
var count=0;
for(var f of htmlFiles){
var slug=f.name.replace('.html','');
if(gamePages.indexOf(slug)!==-1){log('SKIP (game): '+f.name);continue;}
log('Processing: '+f.name+'...');
var r2=await fetch('https://api.github.com/repos/zebroi/vpn-catalog/contents/'+f.name,{headers:{'Authorization':'token '+tk}});
var j=await r2.json();
var raw=atob(j.content.replace(/\n/g,''));
var fixed=raw;
// Get the service name from the page
var svcMatch=fixed.match(/VPN для ([^<—]+?)\s*[—<]/);
var svc=svcMatch?svcMatch[1].trim():slug.replace('vpn-dlya-','').replace(/-/g,' ');
log('  Service: '+svc);
// Fix replacements for non-game pages
var replacements=[
['Отзывы игроков о VPN для','Отзывы пользователей о VPN для'],
['Играю в '+svc+' каждый день','Пользуюсь '+svc+' каждый день'],
['Сын играет в '+svc,'Используем '+svc+' в семье'],
['на планшете. VPN Гусь настроила за минуту','через VPN. VPN Гусь настроила за минуту'],
['Для казуальной игры хватает','Для обычного использования хватает'],
[svc+', игры',svc+', ежедневно'],
[svc+', для детей',svc+', для семьи'],
['для комфортной игры в '+svc,'для комфортного использования '+svc],
['нарушение правил игры','нарушение правил сервиса'],
['и других игр','и других сервисов'],
['почему он важен для игр','почему он важен'],
['WireGuard — современный VPN-протокол. Он в 3–5 раз быстрее OpenVPN и даёт низкий пинг — идеально для '+svc+' и других игр.','WireGuard — современный VPN-протокол. Он в 3–5 раз быстрее OpenVPN и даёт минимальные задержки — идеально для '+svc+' и других сервисов.'],
['Можно ли играть в '+svc+' и просматривать YouTube с одним VPN','Можно ли использовать '+svc+' и смотреть YouTube с одним VPN'],
['подходят и для '+svc+', и для YouTube 4K. Один сервис — два последовательных задачи.','подходят и для '+svc+', и для YouTube 4K. Один сервис для всех задач.'],
['низкий пинг для игр','стабильное соединение'],
['Игровые серверы с низким пингом для '+svc,'Быстрые серверы для '+svc],
['Для игр','Быстрый'],
['— низкий пинг и обход блокировок','— стабильный доступ и обход блокировок'],
['Выбирайте по пингу, скорости и цене','Выбирайте по скорости, надёжности и цене'],
['без лагов и банов','без сбоев и ограничений'],
['Низкий пинг','Стабильный'],
[svc+' казуал',svc+', обычное использование'],
[svc+' без VPN',svc+' без VPN'],
];
for(var rp of replacements){
fixed=fixed.split(rp[0]).join(rp[1]);
}
// Fix emoji for non-game sections
fixed=fixed.replace(/\u{1F3AE} Топ подборка/gu,'\u{2B50} Топ подборка');
fixed=fixed.replace(/\u{1F3AE} Каталог/gu,'\u{1F4CB} Каталог');
if(fixed===raw){log('  No changes needed.');continue;}
log('  Changes found, saving...');
var b64=btoa(unescape(encodeURIComponent(fixed)));
var resp=await fetch('https://api.github.com/repos/zebroi/vpn-catalog/contents/'+f.name,{method:'PUT',headers:{'Authorization':'token '+tk,'Content-Type':'application/json'},body:JSON.stringify({message:'Fix game text in '+f.name,content:b64,branch:'main',sha:j.sha})});
log('  '+(resp.ok?'SUCCESS':'FAIL: '+resp.status));
if(resp.ok)count++;
await new Promise(r=>setTimeout(r,500));
}
log('\nDone! Fixed '+count+' files.');
}
</script></body></html>
