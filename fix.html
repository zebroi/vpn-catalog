function fixHtml(h){
  var pairs=[
    ['\u0434\u043B\u044F \u0438\u0433\u0440\u044B \u0432 ','\u0434\u043B\u044F '],
    ['\u043D\u0430 \u0441\u0435\u0440\u0432\u0435\u0440\u0430\u0445 \u0420\u043E\u0431\u043B\u043E\u043A\u0441',''],
    ['\u0441\u0435\u0440\u0432\u0435\u0440\u0430\u0445 \u0420\u043E\u0431\u043B\u043E\u043A\u0441','\u0441\u0435\u0440\u0432\u0435\u0440\u0430\u0445'],
    ['\u0414\u0430\u043D\u0438\u043B \u041A.','\u0410\u043B\u0435\u043A\u0441\u0435\u0439 \u041C.'],
    ['\u0410\u043D\u043D\u0430 \u0421.','\u041C\u0430\u0440\u0438\u044F \u041A.'],
    ['\u041C\u0430\u043A\u0441\u0438\u043C \u0412.','\u0414\u043C\u0438\u0442\u0440\u0438\u0439 \u0421.']
  ];
  for(var i=0;i<pairs.length;i++){
    while(h.indexOf(pairs[i][0])!==-1){
      h=h.split(pairs[i][0]).join(pairs[i][1]);
    }
  }
  return h;
}

async function getFile(tk,path){
  var r=await fetch('https://api.github.com/repos/'+O+'/'+R+'/contents/'+path,
    {headers:{'Authorization':'token '+tk}});
  if(!r.ok)return null;
  var j=await r.json();
  return {content:atob(j.content.replace(/\n/g,'')),sha:j.sha};
}

async function putFile(tk,path,content,sha,msg){
  var b64=btoa(unescape(encodeURIComponent(content)));
  var r=await fetch('https://api.github.com/repos/'+O+'/'+R+'/contents/'+path,
    {method:'PUT',headers:{'Authorization':'token '+tk,'Content-Type':'application/json'},
    body:JSON.stringify({message:msg,content:b64,branch:B,sha:sha})});
  return r.ok;
}

async function fixIndexHtml(tk){
  log('Fixing index.html...');
  var f=await getFile(tk,'index.html');
  if(!f){log(' FAIL');return;}
  var h=f.content;
  if(h.indexOf('html.light{--bg:#f5f5f0')!==-1 && h.indexOf('<style>html.light')===-1){
    h=h.replace('html.light{--bg:#f5f5f0','<style>html.light{--bg:#f5f5f0');
    h=h.replace('const t=localStorage.getItem(','<'+'/style><'+'script>const t=localStorage.getItem(');
    h=h.replace('<'+'/body>','<'+'/script><'+'/body>');
    log(' Fixed CSS/JS wrapping');
  } else {
    log(' Already fixed or different structure');
  }
  var ok=await putFile(tk,'index.html',h,f.sha,'Fix index.html');
  log(ok?' OK':' FAIL');
}

async function fixPage(tk,fname){
  var f=await getFile(tk,fname+'.html');
  if(!f){log(' skip');return;}
  var fixed=fixHtml(f.content);
  if(fixed===f.content){log(' no changes');return;}
  var ok=await putFile(tk,fname+'.html',fixed,f.sha,'Fix artifacts');
  log(ok?' OK':' FAIL');
}

async function run(){
  var tk=document.getElementById('tk').value.trim();
  if(!tk){log('Enter token!');return;}
  log('Starting fix...');
  await fixIndexHtml(tk);
  for(var i=0;i<allFiles.length;i++){
    log('['+(i+1)+'/'+allFiles.length+'] '+allFiles[i]);
    await fixPage(tk,allFiles[i]);
    await new Promise(function(r){setTimeout(r,500);});
  }
  log('ALL DONE!');
}
