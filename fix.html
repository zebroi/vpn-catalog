'vpn-dlya-minecraft','vpn-dlya-pubg-mobile','vpn-dlya-free-fire','vpn-dlya-fifa','vpn-dlya-gta',
'vpn-dlya-geometry-dash','vpn-dlya-nulls-brawl','vpn-dlya-osu','vpn-dlya-android','vpn-dlya-iphone',
'vpn-dlya-windows','vpn-dlya-macos','vpn-dlya-linux','vpn-dlya-pk','vpn-dlya-smart-tv',

'vpn-dlya-opera','vpn-dlya-edge','vpn-dlya-routera','vpn-dlya-tp-link','vpn-dlya-keenetic',
'vpn-dlya-xiaomi-routera','vpn-dlya-mts','vpn-dlya-bilajn','vpn-dlya-megafon','vpn-dlya-rostelekom',
'vpn-v2ray','vpn-vless','vpn-wireguard','vpn-openvpn','vpn-outline','vpn-hiddify','vpn-amnezia',
'vpn-adguard','vpn-byedpi','vpn-proton','vpn-planet','vpn-hitproxy','vpn-happ','vpn-fkey',

'vpn-dlya-zvonkov','vpn-razdacha-interneta'

function fixHtml(h,fname){
  // Remove Roblox artifacts in text
  h=h.replace(/для игры в /g,'для ');
  h=h.replace(/игры в [^<,.]{1,50} без лагов/g,'использования VPN');
  h=h.replace(/игру в [^<,.]{1,50} без лагов/g,'использование VPN');
  h=h.replace(/на серверах Роблокс/gi,'');
  h=h.replace(/серверах Роблокс/gi,'серверах');
  h=h.replace(/низкий пинг на серверах роблокс/gi,'');
  h=h.replace(/Низкий пинг на серверах Роблокс[^<]*/gi,'');
  h=h.replace(/Подборка проверенных сервисов для игры в [^<]* без лагов и банов/g,'Подборка проверенных VPN-сервисов для России');
  h=h.replace(/Сравниваем 35 VPN-сервисов для игры в ([^в][^<]*) в России/g,'Сравниваем 35 VPN-сервисов для $1 в России');
  h=h.replace(/Играю в Roblox каждый день[^<]*/g,'VPN работает стабильно, скорость отличная.');
  h=h.replace(/Сын играет в Roblox[^<]*/g,'Пользуемся уже полгода, всё работает без сбоев.');
  h=h.replace(/Бесплатный Proton для Roblox[^<]*/g,'Proton VPN отлично справляется с задачей.');
  h=h.replace(/Данил К\./g,'Алексей М.');
  h=h.replace(/Анна С\./g,'Мария К.');
  h=h.replace(/Максим В\./g,'Дмитрий С.');
  h=h.replace(/Зачем нужен VPN для Roblox\?/g,'Зачем нужен VPN?');
  h=h.replace(/Roblox может быть замедлён[^<]*/g,'VPN обходит блокировки и замедления провайдеров.');
  h=h.replace(/Какой VPN лучший для Roblox\?/g,'Какой VPN лучший в 2026?');
  return h;
}

async function fixIndexHtml(tk){
  log('Fixing index.html...');
  const f=await getFile(tk,'index.html');
  if(!f){log(' FAIL');return}
  let h=f.content;
  // The CSS and JS are dumped outside style/script tags after footer
  // Find the pattern: raw CSS right after </footer>
  if(h.includes('html.light{--bg:#f5f5f0') && !h.includes('<style>html.light')){
    h=h.replace('html.light{--bg:#f5f5f0','<style>html.light{--bg:#f5f5f0');
    // Find the end of CSS (before JS function)
    h=h.replace('const t=localStorage.getItem(','</style><scr'+'ipt>const t=localStorage.getItem(');
    // Add closing script tag before </body>
    h=h.replace('</body>','</scr'+'ipt></body>');
    log(' Fixed CSS/JS wrapping');
  } else {
    log(' Already fixed or different structure');
  }
  const ok=await putFile(tk,'index.html',h,f.sha,'Fix index.html: wrap CSS/JS in tags');
  log(ok?' OK':' FAIL');
}

async function getFile(tk,path){
  const r=await fetch('https://api.github.com/repos/'+O+'/'+R+'/contents/'+path,
    {headers:{'Authorization':'token '+tk}});
  if(!r.ok)return null;
  const j=await r.json();
  return {content:atob(j.content.replace(/\n/g,'')),sha:j.sha};
}

async function putFile(tk,path,content,sha,msg){
  const b64=btoa(unescape(encodeURIComponent(content)));
  const r=await fetch('https://api.github.com/repos/'+O+'/'+R+'/contents/'+path,
    {method:'PUT',headers:{'Authorization':'token '+tk,'Content-Type':'application/json'},
    body:JSON.stringify({message:msg,content:b64,branch:B,sha:sha})});
  return r.ok;
}

async function fixPage(tk,fname){
  const f=await getFile(tk,fname+'.html');
  if(!f){log(' skip (not found)');return}
  const fixed=fixHtml(f.content,fname);
  if(fixed===f.content){log(' no changes');return}
  const ok=await putFile(tk,fname+'.html',fixed,f.sha,'Fix: remove Roblox artifacts');
  log(ok?' OK':' FAIL');
}

async function delay(ms){return new Promise(r=>setTimeout(r,ms))}

async function run(){
  const tk=document.getElementById('tk').value.trim();
  if(!tk){log('Enter token!');return}
  log('=== Starting fix ===');
  await fixIndexHtml(tk);
  for(let i=0;i<allFiles.length;i++){
    log('['+(i+1)+'/'+allFiles.length+'] '+allFiles[i]+'...');
    await fixPage(tk,allFiles[i]);
    await delay(500);
  }
  log('=== ALL DONE ===');
}
<\/script>
